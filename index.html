button{font-family:inherit}

.lbox input:focus{outline:none;border-color:var(--neon)}

.lhint{margin-top:14px;font-size:10px;color:var(--muted);text-align:center;line-height:1.5}

.brand{font-size:19px;font-style:italic;font-weight:800;text-transform:uppercase;letter-spacing:-.02em}

function cleanGroup(gid,title,arr){

  return '<div class="crow"><input type="checkbox" class="cchk" data-vid="'+i.vid+'">'+
   (i.img?'<img src="'+i.img+'" loading="lazy">':'')+

   '<span class="cmeta">'+i.mk+' \u00b7 '+i.price+'\u20ac \u00b7 '+(i.sc!=null?i.sc+'/10':'')+'</span></div>';
 }).join("");
 return '<div class="cgroup"><h4>'+title+' <span class="cnt">('+arr.length+')</span> <button class="csel" data-group="'+gid+'">Tout sûˋlectionner</button></h4>'+rows+'</div>';

function bindClean(){
 document.querySelectorAll(".cchk").forEach(function(c){
  c.onchange=function(){if(c.checked)selectedDel.add(c.getAttribute("data-vid"));else selectedDel.delete(c.getAttribute("data-vid"));updateSelCount();};
 });
 document.querySelectorAll(".csel").forEach(function(b){
  b.onclick=function(){
   var grp=b.closest(".cgroup");
   var boxes=grp.querySelectorAll(".cchk");
   var allChecked=Array.prototype.every.call(boxes,function(x){return x.checked;});
   boxes.forEach(function(x){x.checked=!allChecked;if(x.checked)selectedDel.add(x.getAttribute("data-vid"));else selectedDel.delete(x.getAttribute("data-vid"));});
   b.textContent=allChecked?"Tout sûˋlectionner":"Tout dûˋsûˋlectionner";
   updateSelCount();
  };
 });
}

document.getElementById("fType").onchange=function(){filters.type=this.value;renderGrid();};
document.getElementById("fColl").onchange=function(){filters.coll=this.value;renderGrid();};
document.getElementById("fSize").onchange=function(){filters.size=this.value;renderGrid();};
document.getElementById("fPrice").onchange=function(){filters.price=this.value;renderGrid();};
document.getElementById("fClear").onclick=function(){filters={search:"",country:"",brand:"",type:"",coll:"",size:"",price:""};["fSearch","fCountry","fBrand","fType","fColl","fSize","fPrice"].forEach(function(id){document.getElementById(id).value="";});renderGrid();};
document.querySelectorAll(".navb").forEach(function(b){b.onclick=function(){switchTab(b.getAttribute("data-tab"));};});
var sw=document.getElementById("admSw");sw.onclick=function(){admin=!admin;sw.classList.toggle("on");renderGrid();renderProfile();};
document.getElementById("logout").onclick=function(){localStorage.removeItem("tit_sess");location.reload();};
}
document.getElementById("lbtn").onclick=tryLogin;
document.getElementById("lpw").addEventListener("keydown",function(e){if(e.key==="Enter")tryLogin();});
if(session)startApp();
</script>
